name: Build cursor2plus-patch Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "@cometix/ccursor version to patch, for example latest or 0.0.11"
        required: false
        default: "latest"
      publish_release:
        description: "Create/update GitHub Release"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Patch requested upstream package
        run: |
          node scripts/patch-ccursor.mjs \
            --version "${{ inputs.version || 'latest' }}" \
            --config config/company-ccursor.json

      - name: Verify patched package
        run: npm run verify

      - name: Prepare release assets
        env:
          CCURSOR_RELEASE_BASE_URL: https://github.com/${{ github.repository }}/releases/latest/download
        run: npm run prepare:release

      - name: Validate release shell scripts
        run: |
          bash -n dist/release/install.sh
          bash -n dist/release/uninstall.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cursor2plus-patch-${{ inputs.version || 'latest' }}
          path: dist/release/*
          if-no-files-found: error

      - name: Read company version
        id: version
        run: |
          node -e "const j=require('./dist/release/latest.json'); const fs=require('fs'); fs.appendFileSync(process.env.GITHUB_OUTPUT, 'company_version='+j.companyVersion+'\nrelease_tag=v'+j.companyVersion+'\n')"

      - name: Publish GitHub Release
        if: inputs.publish_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.version.outputs.release_tag }}"
          title="cursor2plus-patch ${{ steps.version.outputs.company_version }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/release/* --clobber
          else
            gh release create "$tag" dist/release/* --title "$title" --notes-file dist/release/release-notes.md
          fi
